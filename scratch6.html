<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body { background: #0d0d0d; margin: 0; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .font-drose { font-family: Impact, sans-serif; }
  </style>
</head>
<body>
  <div style="width: 80vw; height: 200px; position: relative;">
    <svg width="100%" height="100%" viewBox="0 0 1200 250" preserveAspectRatio="xMidYMid meet">
      <defs>
        <clipPath id="creativeVideoClip">
          <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" font-size="220" class="font-drose">CREATIVE</text>
        </clipPath>
      </defs>
      <foreignObject x="0" y="0" width="100%" height="100%" clip-path="url(#creativeVideoClip)">
        <div xmlns="http://www.w3.org/1999/xhtml" style="width: 100%; height: 100%; background: #ff5e00;">
          <video autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: cover;">
             <source src="https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4" type="video/mp4" />
          </video>
        </div>
      </foreignObject>
    </svg>
  </div>
</body>
</html>
