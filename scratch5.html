<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body { background: #0d0d0d; margin: 0; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
    @font-face { font-family: 'drose'; src: local('Impact'); }
    .font-drose { font-family: 'drose', Impact, sans-serif; }
  </style>
</head>
<body>
  <div style="width: 80vw; height: 200px; border: 1px solid red; position: relative;">
    <svg width="100%" height="100%" viewBox="0 0 1000 250" preserveAspectRatio="xMidYMid meet">
      <defs>
        <mask id="testMask">
          <rect width="100%" height="100%" fill="black" />
          <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="200" class="font-drose">CREATIVE</text>
        </mask>
      </defs>
      <foreignObject x="0" y="0" width="100%" height="100%" mask="url(#testMask)">
        <div xmlns="http://www.w3.org/1999/xhtml" style="width: 100%; height: 100%;">
          <video autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: cover;">
             <source src="https://assets.mixkit.co/videos/preview/mixkit-waves-in-the-water-1164-large.mp4" type="video/mp4" />
          </video>
        </div>
      </foreignObject>
    </svg>
  </div>
</body>
</html>
