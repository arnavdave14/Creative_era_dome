<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body { background: #0d0d0d; margin: 0; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; }
    .font-drose { font-family: Impact, sans-serif; font-weight: bold; }
    
    .bg-clip-text {
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>
  <div style="font-size: 15vw; line-height: 0.8; letter-spacing: -0.02em;" class="font-drose">
    <span class="bg-clip-text" style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop'); background-size: cover; background-position: center;">
      CREATIVE
    </span>
  </div>
  <div style="font-size: 25vw; line-height: 0.8; letter-spacing: -0.05em; margin-top: -5vw;" class="font-drose">
    <span class="bg-clip-text" style="background-image: url('https://media.giphy.com/media/3o7TKsQ8gEAMqaEUda/giphy.gif'); background-size: cover; background-position: center;">
      ERA
    </span>
  </div>
</body>
</html>
