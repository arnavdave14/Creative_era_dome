<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body { background: #0d0d0d; margin: 0; color: white; }
    .container { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
    @font-face { font-family: 'drose'; src: local('Impact'); }
    .font-drose { font-family: 'drose', sans-serif; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <svg width="100%" height="100%" viewBox="0 0 1000 300">
      <defs>
        <mask id="videoMask">
          <rect width="100%" height="100%" fill="black" />
          <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="260" class="font-drose tracking-tighter">ERA</text>
        </mask>
      </defs>
      <foreignObject width="100%" height="100%" mask="url(#videoMask)">
         <div xmlns="http://www.w3.org/1999/xhtml" style="width: 100%; height: 100%;">
           <video autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: cover;">
             <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4" />
           </video>
         </div>
      </foreignObject>
    </svg>
  </div>
</body>
</html>
