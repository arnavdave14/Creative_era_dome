<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body { background: #0d0d0d; margin: 0; color: white; }
    .container { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div class="container">
    <svg style="width: 100%; height: auto;" viewBox="0 0 1000 350">
      <defs>
        <mask id="videoMask">
          <rect width="100%" height="100%" fill="black" />
          <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" fill="white" font-size="300" font-family="sans-serif">ERA</text>
        </mask>
      </defs>
      <!-- ADDED X AND Y -->
      <foreignObject x="0" y="0" width="100%" height="100%" mask="url(#videoMask)">
         <div xmlns="http://www.w3.org/1999/xhtml" style="width: 100%; height: 100%;">
           <video autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: cover;">
             <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4" />
           </video>
         </div>
      </foreignObject>
    </svg>
  </div>
</body>
</html>
